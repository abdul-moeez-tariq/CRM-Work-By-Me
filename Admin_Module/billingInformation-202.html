<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Billing Information</title>
    <link rel="stylesheet" href="/css/output.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.3/jquery.validate.min.js"></script>
  </head>

  <body class="bg-gray-50 min-h-screen">
    <div class="max-w-6xl mx-auto">
      <h1 class="text-2xl font-bold">Billing Information</h1>
      <p class="mt-2 text-gray-600">
        Your billing details for invoices and payments.
      </p>

      <!-- FORM START -->
      <form id="billingForm">
        <!-- Main -->
        <div class="flex flex-col lg:flex-row gap-8 mt-8">
          <!-- Left -->
          <div class="flex-1 flex flex-col gap-8">
            <!-- Billing Details -->
            <div class="p-6 bg-white border border-gray-200 rounded-xl">
              <h2 class="text-lg font-semibold">Billing Details</h2>

              <div class="grid sm:grid-cols-2 gap-6 mt-4">
                <!-- Billing Name -->
                <div class="relative">
                  <label class="block text-sm font-medium text-gray-700">
                    Billing Name <span class="text-red-500">*</span>
                  </label>
                  <input
                    id="billingName"
                    name="billingName"
                    type="text"
                    placeholder="Enter Billing name here"
                    class="mt-1 p-3 w-full rounded-lg bg-primary border border-primary text-gray-500 focus:outline-none focus:shadow"
                  />
                  <span
                    class="error-msg absolute left-0 -bottom-4.5 text-xs text-red-500"
                  ></span>
                </div>

                <!-- Company Name -->
                <div class="relative">
                  <label class="block text-sm font-medium text-gray-700">
                    Company Name <span class="text-red-500">*</span>
                  </label>
                  <input
                    id="companyName"
                    name="companyName"
                    type="text"
                    placeholder="Enter company name here"
                    class="mt-1 p-3 w-full rounded-lg bg-primary border border-primary text-gray-500 focus:outline-none focus:shadow"
                  />
                  <span
                    class="error-msg absolute left-0 -bottom-4.5 text-xs text-red-500"
                  ></span>
                </div>

                <!-- Billing Email -->
                <div class="relative">
                  <label class="block text-sm font-medium text-gray-700">
                    Billing Email <span class="text-red-500">*</span>
                  </label>
                  <input
                    id="billingEmail"
                    name="billingEmail"
                    type="email"
                    placeholder="Enter billing email here"
                    class="mt-1 p-3 w-full rounded-lg bg-primary border border-primary text-gray-500 focus:outline-none focus:shadow"
                  />
                  <span
                    class="error-msg absolute left-0 -bottom-4.5 text-xs text-red-500"
                  ></span>
                </div>

                <!-- Phone Number -->
                <div class="relative">
                  <label class="block text-sm font-medium text-gray-700">
                    Phone Number <span class="text-red-500">*</span>
                  </label>
                  <input
                    id="phoneNumber"
                    name="phoneNumber"
                    type="tel"
                    placeholder="+92_000_0000000"
                    class="mt-1 p-3 w-full rounded-lg bg-primary border border-primary text-gray-500 focus:outline-none focus:shadow"
                  />
                  <span
                    class="error-msg absolute left-0 -bottom-4.5 text-xs text-red-500"
                  ></span>
                </div>
              </div>
            </div>

            <!-- Billing Address -->
            <div class="p-6 bg-white border border-gray-200 rounded-xl">
              <h2 class="text-lg font-semibold">Billing Address</h2>

              <div class="flex flex-col gap-5 mt-5">
                <!-- Address Line 1 -->
                <div class="relative">
                  <label class="block text-sm font-medium text-gray-700">
                    Address Line 1 <span class="text-red-500">*</span>
                  </label>
                  <input
                    id="addressLine1"
                    name="addressLine1"
                    type="text"
                    placeholder="49 Featherstone Street, London, etc"
                    class="mt-1 p-3 w-full rounded-lg bg-primary border border-primary text-gray-500 focus:outline-none focus:shadow"
                  />
                  <span
                    class="error-msg absolute left-0 -bottom-4.5 text-xs text-red-500"
                  ></span>
                </div>

                <!-- Address Line 2 -->
                <div class="relative">
                  <label class="block text-sm font-medium text-gray-700">
                    Address Line 2
                  </label>
                  <input
                    id="addressLine2"
                    name="addressLine2"
                    type="text"
                    placeholder="49 Featherstone Street, London, etc"
                    class="mt-1 p-3 w-full rounded-lg bg-primary border border-primary text-gray-500 focus:outline-none focus:shadow"
                  />
                  <span
                    class="error-msg absolute left-0 -bottom-4.5 text-xs text-red-500"
                  ></span>
                </div>

                <div class="grid sm:grid-cols-2 gap-6">
                  <!-- City -->
                  <div class="relative">
                    <label class="block text-sm font-medium text-gray-700">
                      City <span class="text-red-500">*</span>
                    </label>
                    <input
                      id="city"
                      name="city"
                      type="text"
                      placeholder="Enter your city name"
                      class="mt-1 p-3 w-full rounded-lg bg-primary border border-primary text-gray-500 focus:outline-none focus:shadow"
                    />
                    <span
                      class="error-msg absolute left-0 -bottom-4.5 text-xs text-red-500"
                    ></span>
                  </div>

                  <!-- Province -->
                  <div class="relative">
                    <label class="block text-sm font-medium text-gray-700">
                      Province <span class="text-red-500">*</span>
                    </label>
                    <select
                      id="province"
                      name="province"
                      class="mt-1 p-3 w-full rounded-lg bg-primary border border-primary text-gray-500 focus:outline-none focus:shadow"
                    >
                      <option value="">Select from the listed Province</option>
                      <option value="Punjab">Punjab</option>
                    </select>
                    <span
                      class="error-msg absolute left-0 -bottom-4.5 text-xs text-red-500"
                    ></span>
                  </div>

                  <!-- Postal Code -->
                  <div class="relative">
                    <label class="block text-sm font-medium text-gray-700">
                      Postal / ZIP Code <span class="text-red-500">*</span>
                    </label>
                    <input
                      id="postalCode"
                      name="postalCode"
                      type="text"
                      placeholder="Enter postal / ZIP code"
                      class="mt-1 p-3 w-full rounded-lg bg-primary border border-primary text-gray-500 focus:outline-none focus:shadow"
                    />
                    <span
                      class="error-msg absolute left-0 -bottom-4.5 text-xs text-red-500"
                    ></span>
                  </div>

                  <!-- Country -->
                  <div class="relative">
                    <label class="block text-sm font-medium text-gray-700">
                      Country <span class="text-red-500">*</span>
                    </label>
                    <select
                      id="country"
                      name="country"
                      class="mt-1 p-3 w-full rounded-lg bg-primary border border-primary text-gray-500 focus:outline-none focus:shadow"
                    >
                      <option value="">Select from the listed country</option>
                      <option value="Pakistan">Pakistan</option>
                    </select>
                    <span
                      class="error-msg absolute left-0 -bottom-4.5 text-xs text-red-500"
                    ></span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Right -->
          <div class="lg:w-80">
            <div
              class="bg-white border border-gray-200 rounded-xl p-5 flex flex-col gap-6"
            >
              <h2 class="text-lg font-semibold">Payment Method</h2>

              <!-- Default Payment Method -->
              <div class="p-3 bg-blue-50 rounded-lg flex flex-col gap-2">
                <div class="flex items-center justify-between">
                  <div>
                    <p class="text-sm text-gray-400">Default Payment Method</p>
                    <p>Card **** 4242</p>
                  </div>
                  <div>
                    <svg
                      width="40"
                      height="28"
                      viewBox="0 0 40 28"
                      fill="none"
                      xmlns="http://www.w3.org/2000/svg"
                    >
                      <path
                        d="M36 0C38.2091 0 40 1.79086 40 4V24C40 26.2091 38.2091 28 36 28H4C1.79086 28 0 26.2091 0 24V4C0 1.79086 1.79086 0 4 0H36Z"
                        fill="url(#paint0_linear_6_10050)"
                      />

                        stroke="#E5E7EB"
                      />
                      <path
                        d="M30.125 28H9.875V0H30.125V28Z"
                        stroke="#E5E7EB"
                      />
                      <g clip-path="url(#clip0_6_10050)">
                        <path
                          d="M26.402 12.3816C26.402 12.3816 26.6691 13.6895 26.7289 13.9637H25.5547C25.6707 13.6508 26.1172 12.4344 26.1172 12.4344C26.1102 12.4449 26.2332 12.1145 26.3035 11.9105L26.402 12.3816ZM30.125 7.0625V19.4375C30.125 20.3691 29.3691 21.125 28.4375 21.125H11.5625C10.6309 21.125 9.875 20.3691 9.875 19.4375V7.0625C9.875 6.13086 10.6309 5.375 11.5625 5.375H28.4375C29.3691 5.375 30.125 6.13086 30.125 7.0625ZM15.2363 15.8938L17.4582 10.4375H15.9641L14.5824 14.1641L14.4313 13.4082L13.9391 10.898C13.8582 10.55 13.6086 10.4516 13.2992 10.4375H11.0246L11 10.5465C11.5555 10.6871 12.0512 10.891 12.4836 11.1477L13.7422 15.8938H15.2363ZM18.5551 15.9008L19.441 10.4375H18.0277L17.1453 15.9008H18.5551ZM23.4734 14.1148C23.4805 13.4926 23.1008 13.018 22.2887 12.6277C21.793 12.3781 21.4906 12.2094 21.4906 11.9527C21.4977 11.7207 21.7473 11.4816 22.3027 11.4816C22.7633 11.4711 23.1008 11.5801 23.3539 11.6891L23.4805 11.7488L23.6738 10.5676C23.3961 10.4586 22.9531 10.3355 22.4082 10.3355C21.0125 10.3355 20.0316 11.0809 20.0246 12.1426C20.0141 12.9266 20.7277 13.3625 21.2621 13.6262C21.807 13.8934 21.9934 14.0691 21.9934 14.3047C21.9863 14.6703 21.5504 14.8391 21.1461 14.8391C20.5836 14.8391 20.2812 14.7512 19.8207 14.5473L19.6344 14.4594L19.4375 15.6863C19.768 15.8375 20.3797 15.9711 21.0125 15.9781C22.4961 15.9816 23.4629 15.2469 23.4734 14.1148ZM28.4375 15.9008L27.2984 10.4375H26.2051C25.8676 10.4375 25.6109 10.5359 25.4668 10.891L23.368 15.9008H24.8516C24.8516 15.9008 25.0941 15.2258 25.1469 15.0816H26.9609C27.0031 15.275 27.1297 15.9008 27.1297 15.9008H28.4375Z"
                          fill="white"
                        />
                      </g>
                      <defs>
                        <linearGradient
                          id="paint0_linear_6_10050"
                          x1="0"
                          y1="14"
                          x2="40"
                          y2="14"
                          gradientUnits="userSpaceOnUse"
                        >
                          <stop stop-color="#2563EB" />
                          <stop offset="1" stop-color="#60A5FA" />
                        </linearGradient>
                        <clipPath id="clip0_6_10050">
                          <path
                            d="M9.875 4.25H30.125V22.25H9.875V4.25Z"
                            fill="white"
                          />
                        </clipPath>
                      </defs>
                    </svg>
                  </div>
                </div>

                <div class="flex items-center justify-between">
                  <p class="text-sm text-gray-400">Card Type:</p>
                  <span class="font-medium text-gray-900">Visa</span>
                </div>

                <div class="flex items-center justify-between">
                  <p class="text-sm text-gray-400">Expiry Date:</p>
                  <span class="font-medium text-gray-900">12/2025</span>
                </div>
              </div>

              <!-- Info Box -->
              <div class="pt-5 border-t border-gray-200">
                <div
                  class="inline-flex items-start gap-2 px-3 py-2 bg-blue-50 text-blue-700 text-sm rounded-lg border border-blue-200"
                >
                  <svg
                    width="24"
                    height="24"
                    viewBox="0 0 12 12"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                  >
                    <path
                      d="M6 12C7.5913 12 9.11742 11.3679 10.2426 10.2426C11.3679 9.11742 12 7.5913 12 6C12 4.4087 11.3679 2.88258 10.2426 1.75736C9.11742 0.632141 7.5913 0 6 0C4.4087 0 2.88258 0.632141 1.75736 1.75736C0.632141 2.88258 0 4.4087 0 6C0 7.5913 0.632141 9.11742 1.75736 10.2426C2.88258 11.3679 4.4087 12 6 12ZM5.0625 7.875H5.625V6.375H5.0625C4.75078 6.375 4.5 6.12422 4.5 5.8125C4.5 5.50078 4.75078 5.25 5.0625 5.25H6.1875C6.49922 5.25 6.75 5.50078 6.75 5.8125V7.875H6.9375C7.24922 7.875 7.5 8.12578 7.5 8.4375C7.5 8.74922 7.24922 9 6.9375 9H5.0625C4.75078 9 4.5 8.74922 4.5 8.4375C4.5 8.12578 4.75078 7.875 5.0625 7.875ZM6 3C6.19891 3 6.38968 3.07902 6.53033 3.21967C6.67098 3.36032 6.75 3.55109 6.75 3.75C6.75 3.94891 6.67098 4.13968 6.53033 4.28033C6.38968 4.42098 6.19891 4.5 6 4.5C5.80109 4.5 5.61032 4.42098 5.46967 4.28033C5.32902 4.13968 5.25 3.94891 5.25 3.75C5.25 3.55109 5.32902 3.36032 5.46967 3.21967C5.61032 3.07902 5.80109 3 6 3Z"
                      fill="#3B82F6"
                    />
                  </svg>

                  <span>
                    To update payment method, go to Payment Methods.
                  </span>
                </div>
              </div>

              <!-- Button -->
              <button
                type="button"
                class="w-full flex items-center justify-center px-5 py-3 border border-gray-400 rounded-lg text-sm font-medium text-gray-800 focus:outline-none cursor-pointer"
              >
                Manage Payment Methods
              </button>
            </div>
          </div>
        </div>
      </form>
    </div>

    <!-- ============================= -->
    <!-- Fixed Bottom Action Bar -->
    <!-- ============================= -->
    <div class="w-full mt-12 bg-white border-t border-gray-200 shadow-lg z-50">
      <div
        class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4"
      >
        <!-- Left Text -->
        <div
          class="flex items-center gap-2 text-sm text-gray-800 w-full sm:w-auto"
        >
          <!-- Icon -->
          <svg
            width="13"
            height="14"
            viewBox="0 0 13 14"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M3.9375 3.9375V5.25H8.3125V3.9375C8.3125 2.72891 7.33359 1.75 6.125 1.75C4.91641 1.75 3.9375 2.72891 3.9375 3.9375ZM2.1875 5.25V3.9375C2.1875 1.76367 3.95117 0 6.125 0C8.29883 0 10.0625 1.76367 10.0625 3.9375V5.25H10.5C11.4652 5.25 12.25 6.03477 12.25 7V12.25C12.25 13.2152 11.4652 14 10.5 14H1.75C0.784766 14 0 13.2152 0 12.25V7C0 6.03477 0.784766 5.25 1.75 5.25H2.1875Z"
              fill="#4B5563"
            />
          </svg>

          <span class="leading-relaxed">
            Your payment information is secure
          </span>
        </div>

        <!-- Right Buttons -->
        <div class="flex flex-col sm:flex-row w-full sm:w-auto gap-3">
          <button
            type="button"
            class="w-full sm:w-auto px-5 py-2.5 rounded-lg border border-indigo-300 bg-indigo-50 text-indigo-600 font-medium hover:bg-indigo-100 transition-all inline-flex items-center justify-center gap-2"
          >
            <!-- SVG Icon -->
            <svg
              width="11"
              height="16"
              viewBox="0 0 11 16"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              class="shrink-0"
            >
              <path
                d="M0.75 3.23487C0.75 2.36516 0.75 1.93031 0.919282 1.59796C1.06817 1.30575 1.30575 1.06817 1.59796 0.919282C1.93031 0.75 2.36516 0.75 3.23487 0.75H7.58339C8.45309 0.75 8.88795 0.75 9.2203 0.919282C9.51251 1.06817 9.75008 1.30575 9.89898 1.59796C10.0683 1.93031 10.0683 2.36516 10.0683 3.23487V13.5665C10.0683 13.9439 10.0683 14.1326 9.98983 14.2358C9.95594 14.2808 9.91269 14.3178 9.86308 14.3443C9.81347 14.3709 9.75869 14.3863 9.70252 14.3896C9.57284 14.3974 9.41598 14.2925 9.10227 14.0836L5.40913 11.6213L1.71599 14.0829C1.40228 14.2925 1.24542 14.3974 1.11496 14.3896C1.05893 14.3862 1.00429 14.3707 0.954825 14.3442C0.905357 14.3176 0.862234 14.2807 0.828429 14.2358C0.75 14.1326 0.75 13.9439 0.75 13.5665V3.23487Z"
                fill="#3B82F6"
                stroke="#3B82F6"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>

            Save as Draft
          </button>

          <button
            type="button"
            class="w-full sm:w-auto px-4 py-2.5 rounded-lg border border-gray-300 bg-white text-gray-700 font-medium hover:bg-gray-50 transition-all"
          >
            Cancel
          </button>

          <button
            type="submit"
            form="billingForm"
            class="w-full sm:w-auto px-5 py-2.5 rounded-lg bg-indigo-500 text-white font-medium shadow-sm hover:bg-indigo-700 transition-all inline-flex items-center justify-center gap-2"
          >
            <!-- SVG Icon -->
            <svg
              width="13"
              height="13"
              viewBox="0 0 13 13"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              class="shrink-0"
            >
              <path
                d="M13 2.88889V11.5556C13 11.9528 12.8587 12.2929 12.5761 12.5761C12.2934 12.8592 11.9533 13.0005 11.5556 13H1.44444C1.04722 13 0.707296 12.8587 0.424667 12.5761C0.142037 12.2934 0.000481481 11.9533 0 11.5556V1.44444C0 1.04722 0.141556 0.707296 0.424667 0.424667C0.707778 0.142037 1.0477 0.000481481 1.44444 0H10.1111L13 2.88889ZM6.5 10.8333C7.10185 10.8333 7.61343 10.6227 8.03472 10.2014C8.45602 9.78009 8.66667 9.26852 8.66667 8.66667C8.66667 8.06481 8.45602 7.55324 8.03472 7.13194C7.61343 6.71065 7.10185 6.5 6.5 6.5C5.89815 6.5 5.38657 6.71065 4.96528 7.13194C4.54398 7.55324 4.33333 8.06481 4.33333 8.66667C4.33333 9.26852 4.54398 9.78009 4.96528 10.2014C5.38657 10.6227 5.89815 10.8333 6.5 10.8333ZM2.16667 5.05555H8.66667V2.16667H2.16667V5.05555Z"
                fill="white"
              />
            </svg>

            Save Changes
          </button>
        </div>
      </div>
    </div>

    <script>
      $(document).ready(function () {
        $("#billingForm").validate({
          rules: {
            billingName: { required: true, minlength: 3 },
            companyName: { required: true, minlength: 2 },
            billingEmail: { required: true, email: true },
            phoneNumber: { required: true, minlength: 10 },
            addressLine1: { required: true },
            city: { required: true },
            province: { required: true },
            postalCode: { required: true },
            country: { required: true },
          },
          messages: {
            billingName: {
              required: "Must fill this field to proceed further",
              minlength: "Minimum 3 characters required",
            },
            companyName: {
              required: "Must fill this field to proceed further",
              minlength: "Minimum 2 characters required",
            },
            billingEmail: {
              required: "Enter a valid email address (example@domain.com)",
              email: "Enter a valid email",
            },
            phoneNumber: {
              required: "Invalid phone number",
              minlength: "Enter valid phone number",
            },
            addressLine1: {
              required: "Must fill this field to proceed further",
            },
            city: {
              required: "Must fill this field to proceed further",
            },
            province: {
              required: "Must choose Date to proceed further",
            },
            postalCode: {
              required: "Must fill this field to proceed further",
            },
            country: {
              required: "Must choose Date to proceed further",
            },
          },
          // highlight: function (element) {
          //   $(element).removeClass("border-green-500");
          // },
          // unhighlight: function (element) {
          //   $(element).addClass("border-green-500");
          // },
          errorPlacement: function (error, element) {
            element.closest("div").find(".error-msg").html(error);
          },

          // ────────────────────────────────────────────────
          //     Yeh important change hai
          // ────────────────────────────────────────────────
          submitHandler: function (form) {
            alert("Billing Form Submitted ✅");

            // Saare fields empty kar do
            form.reset();
          },
        });
      });
    </script>
  </body>
</html>
