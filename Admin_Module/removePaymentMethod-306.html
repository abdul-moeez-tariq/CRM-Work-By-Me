<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remove Payment Method</title>
    <link rel="stylesheet" href="../css/output.css" />
  </head>

  <body class="bg-gray-200 h-screen flex items-center justify-center">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl">
      <!-- Header -->
      <div
        class="flex items-center justify-between px-6 py-5 border-b border-gray-200"
      >
        <div class="flex items-center gap-3">
          <!-- Warning Icon -->
          <div class="w-10 h-10 flex items-center justify-center rounded-lg">
            <svg
              width="40"
              height="40"
              viewBox="0 0 40 40"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M0 10C0 4.477 4.477 0 10 0H30C35.523 0 40 4.477 40 10V30C40 35.523 35.523 40 30 40H10C4.477 40 0 35.523 0 30V10Z"
                fill="#FFE2E2"
              />
              <path
                d="M29.732 25.998L21.732 11.998C21.558 11.691 21.305 11.435 20.999 11.256C20.694 11.078 20.346 10.984 19.992 10.984C19.639 10.984 19.291 11.078 18.985 11.256C18.68 11.435 18.427 11.691 18.252 11.998L10.252 25.998C10.076 26.304 9.984 26.65 9.984 27.003C9.985 27.355 10.079 27.702 10.257 28.006C10.435 28.311 10.69 28.563 10.996 28.737C11.303 28.911 11.65 29.001 12.002 28.998H28.002C28.353 28.997 28.698 28.905 29.002 28.73C29.306 28.554 29.558 28.301 29.733 27.998C29.908 27.694 30.001 27.349 30 26.998C30 26.647 29.908 26.302 29.732 25.998Z"
                stroke="#E7000B"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M20 17V21"
                stroke="#E7000B"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M20 25H20.01"
                stroke="#E7000B"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>

          <h2 class="text-lg font-semibold text-gray-800">
            Remove Payment Method
          </h2>
        </div>

        <!-- Close -->
        <button
          id="closeBtn"
          class="text-gray-400 hover:text-gray-600 cursor-pointer"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>

      <!-- Content -->
      <div class="px-6 py-6 flex flex-col gap-5">
        <p class="text-gray-600">
          Are you sure you want to remove the card ending in
          <span class="font-semibold text-gray-800">••• 8765</span>?
        </p>

        <!-- Warning Box -->
        <div
          class="p-4 text-sm text-orange-300 bg-gray-50 border border-orange-300 rounded-lg"
        >
          <span class="font-bold">Warning:</span> This action cannot be undone.
          Any active subscriptions using this card will need to be updated with
          a different payment method.
        </div>

        <!-- Buttons -->
        <div class="flex gap-4 pt-2">
          <button
            id="cancelBtn"
            class="w-full py-3 border border-gray-400 rounded-lg text-gray-400 font-medium hover:bg-gray-50 cursor-pointer"
          >
            Cancel
          </button>
          <button
            id="removeBtn"
            class="w-full py-3 bg-red-500 text-white rounded-lg font-medium hover:bg-red-600 cursor-pointer"
          >
            Remove Card
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
