<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Form Validation</title>

    <link rel="stylesheet" href="./css/output.css" />

    <!-- <script src="https://cdn.tailwindcss.com"></script> -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.3/jquery.validate.min.js"></script>
  </head>

  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-md">
      <h2 class="text-2xl font-semibold text-gray-700 mb-6">Create Project</h2>

      <form id="projectForm" novalidate>
        <!-- Project Title -->
        <div class="mb-8 relative">
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Project Title <span class="text-red-500">*</span>
          </label>

          <input
            type="text"
            name="projectTitle"
            placeholder="Enter Project Title"
            autocomplete="off"
            class="p-3 w-full rounded-lg border border-gray-300 focus:outline-none text-gray-500"
          />

          <!-- Absolute Error -->
          <span
            id="projectTitleError"
            class="absolute left-0 -bottom-5 text-red-500 text-xs"
          ></span>
        </div>

        <!-- Project Code -->
        <div class="mb-8 relative">
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Project Code <span class="text-red-500">*</span>
          </label>

          <input
            type="text"
            name="projectCode"
            placeholder="Enter Project Code"
            autocomplete="off"
            class="p-3 w-full rounded-lg border border-gray-300 focus:outline-none text-gray-500"
          />

          <!-- Absolute Error -->
          <span
            id="projectCodeError"
            class="text-red-500 text-xs absolute left-0 -bottom-5"
          ></span>
        </div>

        <button
          type="submit"
          class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition"
        >
          Submit
        </button>
      </form>
    </div>

    <script src="./js/index.js"></script>
