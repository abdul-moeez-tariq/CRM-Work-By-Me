<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Management Form - Tailwind v4</title>

    <!-- Tailwind CSS v4 Play CDN (for quick prototyping – use build for production) -->

  <body
    class="pb-32 bg-gray-50 dark:bg-gray-900 min-h-screen text-gray-900 dark:text-gray-100"
  >
    <div class="py-8 px-4 sm:px-6 lg:px-8">
      <h1 class="text-2xl font-bold mb-8 text-center sm:text-left">
        Create / Edit User
      </h1>

      <form id="userForm" class="space-y-10">
        <!-- ┌─────────────────────────────┐ -->
        <!-- │  1. BASIC + ROLE & ACCESS   │ -->
        <!-- └─────────────────────────────┘ -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-8">
          <!-- Basic Information -->
          <div
            class="bg-white dark:bg-gray-800 shadow-sm rounded-xl p-6 border border-gray-200 dark:border-gray-700"
          >
            <div class="mb-6">
              <div class="flex items-start gap-3">
                <!-- Icon SVG -->
                <svg
                  width="38"
                  height="40"
                  viewBox="0 0 38 40"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                  class="shrink-0 mt-0.5"
                >
                  <path
                    d="M30 0C34.4183 0 38 3.58172 38 8V32C38 36.4183 34.4183 40 30 40H8C3.58172 40 0 36.4183 0 32V8C0 3.58172 3.58172 0 8 0H30Z"
                    fill="#DBEAFE"
                  />
                  <path
                    d="M30 0C34.4183 0 38 3.58172 38 8V32C38 36.4183 34.4183 40 30 40H8C3.58172 40 0 36.4183 0 32V8C0 3.58172 3.58172 0 8 0H30Z"
                    stroke="#E5E7EB"
                  />
                  <path d="M24 32H13V8H24V32Z" stroke="#E5E7EB" />
                  <g clip-path="url(#clip0_325_17907)">
                    <path
                      d="M18.5 20C19.5609 20 20.5783 19.5786 21.3284 18.8284C22.0786 18.0783 22.5 17.0609 22.5 16C22.5 14.9391 22.0786 13.9217 21.3284 13.1716C20.5783 12.4214 19.5609 12 18.5 12C17.4391 12 16.4217 12.4214 15.6716 13.1716C14.9214 13.9217 14.5 14.9391 14.5 16C14.5 17.0609 14.9214 18.0783 15.6716 18.8284C16.4217 19.5786 17.4391 20 18.5 20ZM17.0719 21.5C13.9938 21.5 11.5 23.9937 11.5 27.0719C11.5 27.5844 11.9156 28 12.4281 28H24.5719C25.0844 28 25.5 27.5844 25.5 27.0719C25.5 23.9937 23.0063 21.5 19.9281 21.5H17.0719Z"
                      fill="#3B82F6"
                    />
                  </g>
                  <defs>
                    <clipPath id="clip0_325_17907">
                      <path d="M11.5 12H25.5V28H11.5V12Z" fill="white" />
                    </clipPath>
                  </defs>
                </svg>

                <!-- Text content -->
                <div class="flex flex-col">
                  <h2 class="text-lg font-bold text-gray-900 dark:text-white">
                    Basic Information
                  </h2>
                  <p class="text-sm text-gray-500 dark:text-gray-400">
                    Enter user's personal details
                  </p>
                </div>
              </div>
            </div>

            <div class="space-y-5">
              <!-- Full Name -->
              <div class="form-group">
                <label class="block text-sm font-medium mb-1.5"
                  >Full Name <span class="text-red-500">*</span></label
                >
                <input
                  type="text"
                  placeholder="Enter full name"
                  autocomplete="off"
                  class="w-full px-4 py-2.5 border rounded-lg bg-gray-100 dark:bg-gray-700/40 border-gray-300 dark:border-gray-600"
                />
                <p class="error-msg text-red-500 text-xs mt-1 hidden"></p>
              </div>

              <!-- Email & Phone Number -->
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <!-- Email Address -->
                <div class="form-group">
                  <label class="block text-sm font-medium mb-1.5"
                    >Email Address <span class="text-red-500">*</span></label
                  >
                  <input
                    type="email"
                    placeholder="Enter your email address"
                    class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-100 dark:bg-gray-700/40"
                  />
                  <p class="error-msg text-red-500 text-xs mt-1 hidden"></p>
                </div>

                <!-- Phone Number -->
                <div class="form-group">
                  <label class="block text-sm font-medium mb-1.5"
                    >Phone Number <span class="text-red-500">*</span></label
                  >
                  <input
                    type="tel"
                    placeholder="Enter phone number"
                    class="w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-100 dark:bg-gray-700/40"
                  />
                  <p class="error-msg text-red-500 text-xs mt-1 hidden"></p>
                </div>
              </div>

              <!-- Location -->
              <div class="form-group">
                <label class="block text-sm font-medium mb-1.5"
                  >Location <span class="text-red-500">*</span></label
                >
                <input
                  type="text"
                  placeholder="Enter your location"
                  class="w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-100 dark:bg-gray-700/40"
                />
                <p class="error-msg text-red-500 text-xs mt-1 hidden"></p>
              </div>

              <!-- Department & Designation -->
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <!-- Department -->
                <div class="form-group">
                  <label class="block text-sm font-medium mb-1.5">
                    Department <span class="text-red-500">*</span>
                  </label>

                  <div class="relative">
                    <select
                      id="department-select"
                      class="w-full px-4 py-2.5 pr-12 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-100 dark:bg-gray-700/40 appearance-none"
                    >
                      <option value="" disabled selected>
                        Choose the department
                      </option>
                      <option value="Engineering">Engineering</option>
                      <option value="Design">Design</option>
                      <option value="HR">HR</option>
                      <option value="Marketing">Marketing</option>
                    </select>

                    <div
                      class="absolute inset-y-0 right-4 flex items-center pointer-events-none"
                    >
                      <svg
                        class="w-5 h-5 text-gray-400 dark:text-gray-500"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M19 9l-7 7-7-7"
                        />
                      </svg>
                    </div>
                  </div>

                  <!-- ✅ ERROR MESSAGE -->
                  <p class="error-msg text-red-500 text-xs mt-1 hidden"></p>
                </div>

                <!-- Designation -->
                <div class="form-group">
                  <label class="block text-sm font-medium mb-1.5">
                    Designation <span class="text-red-500">*</span>
                  </label>

                  <div class="relative">
                    <select
                      id="designation-select"
                      class="w-full px-4 py-2.5 pr-12 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-100 dark:bg-gray-700/40 appearance-none"
                    >
                      <option value="" disabled selected>
                        Choose the designation
                      </option>
                      <option value="UI/UX Designer">UI/UX Designer</option>
                      <option value="Frontend Developer">
                        Frontend Developer
                      </option>
                      <option value="Product Manager">Product Manager</option>
                    </select>

                    <div
                      class="absolute inset-y-0 right-4 flex items-center pointer-events-none"
                    >
                      <svg
                        class="w-5 h-5 text-gray-400 dark:text-gray-500"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M19 9l-7 7-7-7"
                        />
                      </svg>
                    </div>
                  </div>

                  <!-- ✅ ERROR MESSAGE -->
                  <p class="error-msg text-red-500 text-xs mt-1 hidden"></p>
                </div>
              </div>

              <!-- Account Status -->
              <div
                class="bg-gray-100 dark:bg-gray-700/40 border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-3.5"
              >
                <div class="flex items-center justify-between gap-4">
                  <!-- Left column: label + description -->
                  <div class="flex flex-col gap-0.5">
                    <span
                      class="text-sm font-medium text-gray-800 dark:text-gray-200"
                    >
                      Account Status
                    </span>
                    <p class="text-xs text-gray-500 dark:text-gray-400">
                      User account will be active by default
                    </p>
                  </div>

                  <!-- Right column: toggle (vertically centered) -->
                  <label
                    class="relative inline-flex items-center cursor-pointer shrink-0"
                  >
                    <input type="checkbox" checked class="sr-only peer" />
                    <div
                      class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-600 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:start-0.5 after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-500 peer-checked:bg-indigo-600"
                    ></div>
                  </label>
                </div>
              </div>
            </div>
          </div>

          <!-- Role & Access -->
          <div
            class="bg-white dark:bg-gray-800 shadow-sm rounded-xl p-6 border border-gray-200 dark:border-gray-700"
          >
            <div class="mb-6">
              <div class="flex items-start gap-3">
                <!-- Role & Access icon -->
                <svg
                  width="40"
                  height="40"
                  viewBox="0 0 40 40"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                  class="shrink-0 mt-0.5"
                >
                  <path
                    d="M32 0C36.4183 0 40 3.58172 40 8V32C40 36.4183 36.4183 40 32 40H8C3.58172 40 0 36.4183 0 32V8C0 3.58172 3.58172 0 8 0H32Z"
                    fill="#DBEAFE"
                  />
                  <path
                    d="M32 0C36.4183 0 40 3.58172 40 8V32C40 36.4183 36.4183 40 32 40H8C3.58172 40 0 36.4183 0 32V8C0 3.58172 3.58172 0 8 0H32Z"
                    stroke="#E5E7EB"
                  />
                  <path d="M30 32H11V8H30V32Z" stroke="#E5E7EB" />
                  <path d="M28.5 28H12.5V12H28.5V28Z" stroke="#E5E7EB" />
                  <path
                    d="M20.5 12C20.6438 12 20.7875 12.0313 20.9188 12.0906L26.8031 14.5875C27.4906 14.8781 28.0031 15.5563 28 16.375C27.9844 19.475 26.7094 25.1469 21.325 27.725C20.8031 27.975 20.1969 27.975 19.675 27.725C14.2906 25.1469 13.0156 19.475 13 16.375C12.9969 15.5563 13.5094 14.8781 14.1969 14.5875L20.0844 12.0906C20.2125 12.0313 20.3563 12 20.5 12ZM20.5 14.0875V25.9C24.8125 23.8125 25.9719 19.1906 26 16.4187L20.5 14.0875Z"
                    fill="#3B82F6"
                  />
                </svg>

                <!-- Text -->
                <div class="flex flex-col">
                  <h2 class="text-lg font-bold text-gray-900 dark:text-white">
                    Role & Access
                  </h2>
                  <p class="text-sm text-gray-500 dark:text-gray-400">
                    Configure user permissions
                  </p>
                </div>
              </div>
            </div>

            <!-- Role -->
            <div class="space-y-6">
              <!-- Role -->
              <div class="form-group">
                <label class="block text-sm font-medium mb-2">
                  Role <span class="text-red-500">*</span>
                </label>

                <div class="relative">
                  <select
                    id="role-select"
                    class="w-full px-4 py-2.5 pr-12 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-100 dark:bg-gray-700/40 appearance-none"
                  >
                    <option value="" disabled selected>Select role here</option>
                    <option>UX Researcher</option>
                    <option>Product Designer</option>
                    <option>Frontend Engineer</option>
                    <option>Prototyping</option>
                  </select>

                  <!-- Custom Arrow -->
                  <div
                    class="absolute inset-y-0 right-4 flex items-center pointer-events-none"
                  >
                    <svg
                      class="w-5 h-5 text-gray-400 dark:text-gray-500"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke="currentColor"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M19 9l-7 7-7-7"
                      />
                    </svg>
                  </div>

                  <p class="error-msg text-red-500 text-xs mt-1 hidden"></p>
                </div>
              </div>

              <div id="role-container" class="flex flex-wrap gap-2 mt-3"></div>

              <!-- Permission Level -->
              <div>
                <label
                  class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
                >
                  Permission Level
                </label>

                <div class="flex flex-wrap gap-3 sm:gap-4">
                  <!-- Viewer -->
                  <label
                    class="cursor-pointer flex items-center gap-2.5 px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 hover:border-gray-400 dark:hover:border-gray-500 transition-all duration-150 has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-100 dark:has-[:checked]:bg-indigo-950/30"
                  >
                    <input
                      type="radio"
                      name="level"
                      value="viewer"
                      class="w-5 h-5 text-indigo-600 border-gray-300 focus:ring-indigo-500 dark:focus:ring-indigo-400"
                    />
                    <span
                      class="text-sm font-medium text-gray-700 dark:text-gray-300"
                      >Viewer</span
                    >
                  </label>

                  <!-- Editor (default checked) -->
                  <label
                    class="cursor-pointer flex items-center gap-2.5 px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 hover:border-gray-400 dark:hover:border-gray-500 transition-all duration-150 has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-100 dark:has-[:checked]:bg-indigo-950/30"
                  >
                    <input
                      type="radio"
                      name="level"
                      value="editor"
                      checked
                      class="w-5 h-5 text-indigo-600 border-gray-300 focus:ring-indigo-500 dark:focus:ring-indigo-400"
                    />
                    <span
                      class="text-sm font-medium text-gray-700 dark:text-gray-300"
                      >Editor</span
                    >
                  </label>

                  <!-- Admin -->
                  <label
                    class="cursor-pointer flex items-center gap-2.5 px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 hover:border-gray-400 dark:hover:border-gray-500 transition-all duration-150 has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-100 dark:has-[:checked]:bg-indigo-950/30"
                  >
                    <input
                      type="radio"
                      name="level"
                      value="admin"
                      class="w-5 h-5 text-indigo-600 border-gray-300 focus:ring-indigo-500 dark:focus:ring-indigo-400"
                    />
                    <span
                      class="text-sm font-medium text-gray-700 dark:text-gray-300"
                      >Admin</span
                    >
                  </label>
                </div>
              </div>

              <!-- Assigned Module Input Feild -->
              <div class="space-y-6">
                <!-- Assigned Module -->
                <div class="form-group">
                  <label class="block text-sm font-medium mb-2">
                    Assigned Module <span class="text-red-500">*</span>
                  </label>

                  <div class="relative">
                    <!-- Select input -->
                    <select
                      id="assigned-module-select"
                      class="w-full px-4 py-2.5 pr-12 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-100 dark:bg-gray-700/40 appearance-none"
                    >
                      <option value="" disabled selected>
                        Select module here
                      </option>
                      <option value="task">Task Management</option>
                      <option value="projects">Projects Management</option>
                      <option value="hr">HR Management</option>
                      <option value="user">User Management</option>
                      <option value="analytics">Analytics & Reports</option>
                    </select>

                    <!-- Custom Arrow -->
                    <div
                      class="absolute inset-y-0 right-4 flex items-center pointer-events-none"
                    >
                      <svg
                        class="w-5 h-5 text-gray-400 dark:text-gray-500"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M19 9l-7 7-7-7"
                        />
                      </svg>
                    </div>

                    <p class="error-msg text-red-500 text-xs mt-1 hidden"></p>
                  </div>
                </div>

                <!-- Selected Modules Chips -->
                <div
                  id="assigned-modules-container"
                  class="flex flex-wrap gap-2 mt-3"
                ></div>
              </div>

              <!-- Selected Modules Chips (static demo) -->
              <!-- <div id="selected-modules" class="flex flex-wrap gap-2 mt-3"></div> -->
            </div>
          </div>
        </div>

        <!-- ┌─────────────────────────────┐ -->
        <!-- │  2. EMPLOYMENT + NOTES      │ -->
        <!-- └─────────────────────────────┘ -->
        <div
          class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-2 border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 shadow-sm rounded-xl"
        >
          <!-- Employment Details (left side, full width on mobile, half on lg) -->
          <div class="p-6">
            <!-- yeh outer div ko flex rakha hai taake grow kaam kare, lekin heading part mein flex nahi -->
            <!-- Heading + subtitle – flex ke baghair -->
            <div class="mb-6">
              <!-- Icon + heading row (inline-block ya float style se) -->
              <div class="inline-block align-top mr-3 shrink-0">
                <div
                  class="w-10 h-10 rounded-lg bg-blue-100 dark:bg-blue-900/40 flex items-center justify-center"
                >
                  <svg
                    width="40"
                    height="40"
                    viewBox="0 0 40 40"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                  >
                    <path
                      d="M32 0C36.4183 0 40 3.58172 40 8V32C40 36.4183 36.4183 40 32 40H8C3.58172 40 0 36.4183 0 32V8C0 3.58172 3.58172 0 8 0H32Z"
                      fill="#DBEAFE"
                    />
                    <path
                      d="M32 0C36.4183 0 40 3.58172 40 8V32C40 36.4183 36.4183 40 32 40H8C3.58172 40 0 36.4183 0 32V8C0 3.58172 3.58172 0 8 0H32Z"
                      stroke="#E5E7EB"
                    />
                    <path d="M27 32H14V8H27V32Z" stroke="#E5E7EB" />
                    <g clip-path="url(#clip0_325_18066)">
                      <path
                        d="M21 28C23.1217 28 25.1566 27.1571 26.6569 25.6569C28.1571 24.1566 29 22.1217 29 20C29 17.8783 28.1571 15.8434 26.6569 14.3431C25.1566 12.8429 23.1217 12 21 12C18.8783 12 16.8434 12.8429 15.3431 14.3431C13.8429 15.8434 13 17.8783 13 20C13 22.1217 13.8429 24.1566 15.3431 25.6569C16.8434 27.1571 18.8783 28 21 28ZM19.75 22.5H20.5V20.5H19.75C19.3344 20.5 19 20.1656 19 19.75C19 19.3344 19.3344 19 19.75 19H21.25C21.6656 19 22 19.3344 22 19.75V22.5H22.25C22.6656 22.5 23 22.8344 23 23.25C23 23.6656 22.6656 24 22.25 24H19.75C19.3344 24 19 23.6656 19 23.25C19 22.8344 19.3344 22.5 19.75 22.5ZM21 16C21.2652 16 21.5196 16.1054 21.7071 16.2929C21.8946 16.4804 22 16.7348 22 17C22 17.2652 21.8946 17.5196 21.7071 17.7071C21.5196 17.8946 21.2652 18 21 18C20.7348 18 20.4804 17.8946 20.2929 17.7071C20.1054 17.5196 20 17.2652 20 17C20 16.7348 20.1054 16.4804 20.2929 16.2929C20.4804 16.1054 20.7348 16 21 16Z"
                        fill="#3B82F6"
                      />
                    </g>
                    <defs>
                      <clipPath id="clip0_325_18066">
                        <path d="M13 12H29V28H13V12Z" fill="white" />
                      </clipPath>
                    </defs>
                  </svg>
                </div>
              </div>

              <!-- Heading aur subtitle block mein -->
              <div class="inline-block align-top">
                <h2 class="text-lg font-bold leading-tight">
                  Basic Information
                </h2>
                <p
                  class="text-sm font-normal text-gray-500 dark:text-gray-400 mt-1"
                >
                  Enter user's personal details
                </p>
              </div>
            </div>

            <!-- Fields - stacked vertically (space-y se) -->
            <div class="space-y-6 grow">
              <!-- Date of Joining -->
              <div>
                <label
                  class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5"
                >
                  Date of Joining
                </label>
                <input
                  type="date"
                  class="w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-100 dark:bg-gray-700/40 text-gray-900 dark:text-gray-100 outline-none"
                  placeholder="MM/DD/YY"
                />
              </div>

              <!-- Employee ID -->
              <div>
                <label
                  class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5"
                >
                  Employee ID
                </label>
                <input
                  type="text"
                  value="EMP-001"
                  class="w-full px-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-lg font-medium bg-gray-100 dark:bg-gray-700/40 text-blue-500 dark:text-gray-100 outline-none"
                />
              </div>

              <!-- Tags - multi select with chips -->
              <div class="w-full">
                <label
                  class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
                >
                  Tags of user
                </label>

                <div class="relative">
                  <select
                    id="tags-select"
                    class="w-full px-4 py-2.5 pr-14 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-100 dark:bg-gray-700/40 appearance-none outline-none cursor-pointer"
                  >
                    <option disabled selected>Select tags for a user</option>
                    <option>Remote</option>
                    <option>New Hire</option>
                    <option>Hybrid</option>
                    <option>Onsite</option>
                    <option>Full Time</option>
                    <option>Part Time</option>
                  </select>

                  <!-- Custom Arrow -->
                  <div
                    class="absolute inset-y-0 right-4 flex items-center pointer-events-none"
                  >
                    <svg
                      class="w-5 h-5 text-gray-400 dark:text-gray-500"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke="currentColor"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M19 9l-7 7-7-7"
                      />
                    </svg>
                  </div>
                </div>
              </div>

              <!-- Selected tags chips -->
              <div
                id="selected-tags"
                class="flex flex-wrap gap-2 mt-3 min-h-10.5"
